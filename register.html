<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create an Expense Tracker account to start managing your expenses.">
    <title>Register — Expense Tracker</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Google Fonts for Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="auth-body">

<!-- Cursor glow div (tracked via JS) -->
<div class="cursor-glow" id="cursorGlow"></div>

<div class="auth-container">

    <div class="auth-card card">

        <div class="auth-header">
            <h1 class="auth-title">Expense Tracker</h1>
            <p class="auth-subtitle">Create your account</p>
        </div>

        <div id="authError" class="alert alert-danger" style="display:none;"></div>

        <form id="registerForm" class="auth-form" novalidate>
            <input type="hidden" name="csrf_token" id="csrfToken">

            <div class="form-group">
                <label class="form-label" for="regUsername">Username</label>
                <input type="text" name="username" id="regUsername" class="form-input" placeholder="Your name" required minlength="2">
                <span class="form-error" id="usernameError"></span>
            </div>

            <div class="form-group">
                <label class="form-label" for="regEmail">Email Address</label>
                <input type="email" name="email" id="regEmail" class="form-input" placeholder="you@example.com" required>
                <span class="form-error" id="emailError"></span>
            </div>

            <div class="form-group">
                <label class="form-label" for="regPassword">Password</label>
                <input type="password" name="password" id="regPassword" class="form-input" placeholder="At least 6 characters" required minlength="6">
                <span class="form-error" id="passwordError"></span>
            </div>

            <div class="form-group">
                <label class="form-label" for="regConfirm">Confirm Password</label>
                <input type="password" name="confirm_password" id="regConfirm" class="form-input" placeholder="Re-enter your password" required>
                <span class="form-error" id="confirmError"></span>
            </div>

            <button type="submit" class="btn btn-primary btn-block" id="registerBtn">
                Create Account
            </button>
        </form>

        <p class="auth-footer">
            Already have an account? <a href="login.html" class="auth-link">Sign in</a>
        </p>

    </div>

</div>

<script src="js/app.js"></script>

</body>
</html>
