<!DOCTYPE html>
<html>
<head>
    <title>Edit Expense</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="app-body">

<div class="container">

    <header class="page-header">
        <h1 class="page-title">Edit Expense</h1>
    </header>

    <form class="expense-form" id="editExpenseForm">
        <input type="hidden" name="id">

        <div class="form-group">
            <label class="form-label">Expense Title</label>
            <input type="text" name="title" class="form-input" required>
        </div>

        <div class="form-group">
            <label class="form-label">Category</label>
            <input type="text" name="category" class="form-input">
        </div>

        <div class="form-group">
            <label class="form-label">Amount</label>
            <input type="number" step="0.01" min="0" name="amount" class="form-input" required>
        </div>

        <div class="form-group">
            <label class="form-label">Date</label>
            <input type="date" name="date" class="form-input" required>
        </div>

        <div class="form-group">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-textarea"></textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-success submit-btn">
                Update Expense
            </button>

            <a href="index.html" class="btn btn-secondary cancel-btn">
                Cancel
            </a>
        </div>

    </form>

</div>

<script src="js/app.js"></script>

</body>
</html>
