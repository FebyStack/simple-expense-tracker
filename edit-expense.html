<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Edit an existing expense in your Expense Tracker.">
    <title>Edit Expense — Expense Tracker</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Google Fonts for Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="app-body">

<nav class="navbar" id="navbar">
    <div class="navbar-inner">
        <a href="dashboard.html" class="navbar-brand">Expense Tracker</a>
        <div class="navbar-right">
            <span class="navbar-user" id="navUsername"></span>
            <button class="btn btn-outline btn-sm" id="logoutBtn">Logout</button>
        </div>
    </div>
</nav>

<div class="container">

    <div class="form-page-wrapper">

    <header class="page-header">
        <h1 class="page-title">Edit Expense</h1>
    </header>

    <div id="formError" class="alert alert-danger" style="display:none;"></div>

    <form class="expense-form card form-card" id="editExpenseForm" novalidate>
        <input type="hidden" name="id">
        <input type="hidden" name="csrf_token" id="csrfToken">

        <div class="form-group">
            <label class="form-label" for="expTitle">Expense Title</label>
            <input type="text" name="title" id="expTitle" class="form-input" placeholder="e.g. Groceries" required>
            <span class="form-error" id="titleError"></span>
        </div>

        <div class="form-group">
            <label class="form-label" for="expCategory">Category</label>
            <select name="category" id="expCategory" class="form-input">
                <option value="">Select category</option>
                <option value="Food">Food</option>
                <option value="Transport">Transport</option>
                <option value="Housing">Housing</option>
                <option value="Utilities">Utilities</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Health">Health</option>
                <option value="Education">Education</option>
                <option value="Shopping">Shopping</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <div class="form-group">
            <label class="form-label" for="expAmount">Amount (₱)</label>
            <input type="number" step="0.01" min="0.01" name="amount" id="expAmount" class="form-input" placeholder="0.00" required>
            <span class="form-error" id="amountError"></span>
        </div>

        <div class="form-group">
            <label class="form-label" for="expDate">Date</label>
            <input type="date" name="date" id="expDate" class="form-input" required>
            <span class="form-error" id="dateError"></span>
        </div>

        <div class="form-group">
            <label class="form-label" for="expDesc">Description (optional)</label>
            <textarea name="description" id="expDesc" class="form-textarea" placeholder="Additional details..."></textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-success submit-btn">
                Update Expense
            </button>
            <a href="dashboard.html" class="btn btn-secondary cancel-btn">
                Cancel
            </a>
        </div>

    </form>

    </div> <!-- /.form-page-wrapper -->

</div>

<script src="js/app.js"></script>

</body>
</html>
